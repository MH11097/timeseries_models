store_type: "c"

model:
  name: sarimax
  order: [3, 0, 3]                          # Grid search 12 combos baseline (RMSPE=0.1477 no-exog)
  seasonal_order: [1, 1, 0, 12]             # S=12 (bi-weekly), seasonal AR thắng MA: P=1 > Q=1 (~0.01 RMSPE)
  trend: n                                  # SARIMAX thuần — không trend deterministic (Box-Jenkins chuẩn)
  exog_columns: [Promo]                     # Ablation 8 combos: chỉ Promo có ích (-1.43% RMSPE), School/State gây nhiễu
  maxiter: 200                              # Kalman filter state-space lớn cần nhiều iterations để hội tụ
  skip_scaling: true                        # SARIMAX dùng giá trị gốc, không cần StandardScaler
